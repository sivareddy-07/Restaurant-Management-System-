<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            🍽️ RestoMan
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/menu">Menu</a></li>
            <li><a href="/tables">Tables</a></li>
            <li><a href="/orders" class="active">Orders</a></li>
            <li><a href="/billing">Billing</a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="margin: 0; padding: 0;">
                    <button type="submit" style="background:none; border:none; color:#ef4444; cursor:pointer; padding:15px 20px; font-size:1rem; font-family:inherit; width:100%; text-align:left;">Logout</button>
                </form>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div><strong>Orders Management</strong></div>
        </header>

        <div class="content-wrapper">
            
            <div class="action-bar">
                <h1 class="page-title" style="margin: 0;">Active Orders</h1>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Table</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="'#' + ${order.id}"></td>
                            <td th:text="${order.restaurantTable.tableNumber}"></td>
                            <td th:text="${#temporals.format(order.orderTime, 'HH:mm')}"></td>
                            <td><span th:class="'badge ' + ${order.status.toLowerCase()}" th:text="${order.status}"></span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="4" style="text-align: center; color: var(--text-muted);">No active orders found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

</body>
</html>
